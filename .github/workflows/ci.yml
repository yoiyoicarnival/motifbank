name: CI

on:
  push:
    branches: [main, master]
    paths:
      - '**.py'
      - 'examples/**'
      - 'requirements*.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy ase
          pip install "pyscf>=2.0"
          pip install "fastapi>=0.100" "uvicorn>=0.23" "pydantic>=2.0"

      - name: Smoke-test import
        run: python3 -c "from motifbank_cli import MotifBank, run_mbe, classify, from_cif; print('import OK')"

      - name: Unit tests (test_motifbank.py)
        env:
          OMP_NUM_THREADS: "1"
        run: python3 test_motifbank.py

      - name: API end-to-end tests (test_api.py)
        env:
          OMP_NUM_THREADS: "1"
        run: python3 test_api.py
        timeout-minutes: 5
